# yaml-language-server: $schema=../../../template.schema.json
id: dotnet-service/query
name: Mediator Query
description: Creates a Mediator query with an optional response and a corresponding handler
version: 1.0.0
language: csharp
steps:
  - action: render
    source: 'content/Query.cs.tera'
    destination: 'src/core/{{ Namespace }}.Core.Application/Features/{{ Feature }}/Queries/{{ Name }}/{{ Name }}Query.cs'
  - action: render
    source: 'content/QueryHandler.cs.tera'
    destination: 'src/core/{{ Namespace }}.Core.Application/Features/{{ Feature }}/Queries/{{ Name }}/{{ Name }}QueryHandler.cs'
  - action: render
    source: 'content/QueryResponse.cs.tera'
    destination: 'src/core/{{ Namespace }}.Core.Application/Features/{{ Feature }}/Queries/{{ Name }}/{{ Name }}Response.cs'
inputs:
  - id: Pipelines
    type: multiselect
    prompt: "Which pipelines do you want to enable?"
    options:
      - Validation
      - Logging
      - Authorization
      - Caching
    default: ["Validation"]
