# yaml-language-server: $schema=../../../template.schema.json
id: dotnet-service/command
name: Mediator Command
description: Creates a Mediator command with an optional response and a corresponding handler
version: 1.0.0
language: csharp
required_modules:
  - mediator
inputs:
  - id: Pipelines
    type: multiselect
    prompt: "Which pipelines do you want to enable?"
    options:
      - Validation
      - Logging
      - Authorization
      - Transaction
      - Caching
    default: ["Validation"]
steps:
  - action: render
    source: 'content/Command.cs.tera'
    destination: 'src/core/{{ Namespace }}.Core.Application/Features/{{ Feature }}/Commands/{{ Name }}/{{ Name }}Command.cs'
  - action: render
    source: 'content/CommandHandler.cs.tera'
    destination: 'src/core/{{ Namespace }}.Core.Application/Features/{{ Feature }}/Commands/{{ Name }}/{{ Name }}CommandHandler.cs'
  - action: render
    source: 'content/CommandResponse.cs.tera'
    destination: 'src/core/{{ Namespace }}.Core.Application/Features/{{ Feature }}/Commands/{{ Name }}/{{ Name }}Response.cs'
